    <!-- Tailwind CSS v4 (CDN, no build) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      html {
        scroll-behavior: smooth;
      }

      mark {
        background: color-mix(in srgb, var(--pui-grad-mid) 60%, transparent);
        color: inherit;
        border-radius: 4px;
        padding: 1px 3px;
        margin: -1px -3px;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
      }

      mark:nth-child(even) {
        background: color-mix(in srgb, var(--pui-grad-from) 60%, transparent);
      }

      .pui-popover {
        max-width: initial !important;
      }

      em {
        /*font-family: serif;*/
        /*font-style: italic;*/
        font-style: normal;
      }

      [data-numbering]::after {
        content: attr(data-numbering) ". ";
        font-weight: 600;
        font-size: 10em;
        line-height: 1em;
        opacity: 0.08;
        position: absolute;
        bottom: 0;
        left: -0.15em;
        text-decoration: none;
      }

      @keyframes bubble-in {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .pui-bubble {
        animation: bubble-in 150ms ease-out both;
      }

      @keyframes tool-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <!-- Import Map: browser-native module resolution, no bundler -->

      data-type="module"
      data-presets="typescript,react"
