<!doctype html>
<html lang="en" class="dark" data-theme="dark">

    <!-- Import Map: browser-native module resolution, no bundler -->

      {
        "imports": {

    <link

  <body>
    <div id="root"></div>

    <!-- Application -->
    <script
      type="text/babel"
      data-type="module"
      data-presets="typescript,react"
    >
      import React, { useState, useEffect, useCallback, useRef } from "react";
      import { createRoot } from "react-dom/client";
      import { marked } from "marked";

      import {
        StickyBanner,
        Aurora,
        NodeGraphBackground,
        EyebrowPill,
        GradientText,
        WordRoll,
        Rotator,
        Prompt,
        PromptHero,
        StatCounter,
        GlassCard,
        LogoMarquee,
        BeforeAfter,
        PricingCard,
        ChatBubble,
        TokenStream,
        MockIDE,
        CommunityBadge,
        ChatFAB,
        Button,
        Sparkle,
        StatusDot,
        Popover,
      } from "performative-ui";

      // ─── Constants ───────────────────────────────────────────────────────

      const STRONG_THRESHOLD = 5000;
      const GITHUB_BASE =
        "https://raw.githubusercontent.com/codename-co/stack/main/hub";

      const EXODUS_API =
        "https://d6lzsqpg2b.execute-api.us-west-2.amazonaws.com";

      const SAAS_NAMES = {
        "1password": "1Password",
        "adobe-xd": "Adobe XD",
        "after-effects": "After Effects",
        amazonapigateway: "Amazon API Gateway",
        amazons3: "Amazon S3",
        auth0: "Auth0",
        dockerhub: "Docker Hub",
        "fast.com": "Fast.com",
        google: "Google Search",
        "google-analytics": "Google Analytics",
        "google-meet": "Google Meet",
        "google-photos": "Google Photos",
        "google-sheets": "Google Sheets",
        googlecloudstorage: "Google Cloud Storage",
        googledrive: "Google Drive",
        "jfrog-artifactory": "JFrog Artifactory",
        langsmith: "LangSmith",
        launchdarkly: "LaunchDarkly",
        "microsoft-office": "Microsoft Office",
        newrelic: "New Relic",
        onlyoffice: "OnlyOffice",
        powerapps: "Power Apps",
        powerbi: "Power BI",
        youtube: "YouTube",
      };

      // AI products excluded — Exodus focuses on replacing traditional SaaS, not AI tools
      const EXCLUDED_SAAS = new Set([
        "chatgpt",
        "claude",
        "github-copilot",
        "google-notebook-lm",
        "midjourney",
        "perplexity",
      ]);

      const AI_MODELS = [
        "anthropic/claude-sonnet-4-6",
        "anthropic/claude-haiku-4-5",
        "google/gemini-2.5-pro",
        "google/gemini-3.5-flash",
      ];

      // ─── Helpers ─────────────────────────────────────────────────────────

      const delay = (ms) => new Promise((r) => setTimeout(r, ms));
      let _msgSeq = 0;
      const msgId = () => `m-${++_msgSeq}-${Date.now()}`;

      const saasDisplayName = (slug) =>
        SAAS_NAMES[slug] ??
        slug.replace(/-/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());

      const downloadFile = (content, filename) => {
        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      };

      // ─── Cloud Deploy Helpers ────────────────────────────────────────────

      const parseComposeImage = (compose) => {
        if (!compose) return null;
        const match = compose.match(/image:\s*['"]?([^\s'"]+)/);
        if (!match) return null;
        // Resolve ${VAR:-default} and ${VAR-default} to default value
        return match[1].replace(/\$\{[^}]*:-?([^}]*)\}/g, "$1");
      };

      const parseComposePort = (compose) => {
        if (!compose) return 80;
        const mapping = compose.match(/['"](\d+):(\d+)/);
        if (mapping) return parseInt(mapping[2]);
        const standalone = compose.match(/ports:\s*\n\s*-\s*['"]?(\d+)/);
        if (standalone) return parseInt(standalone[1]);
        return 80;
      };

      // ─── Stack Desktop API ──────────────────────────────────────────────

      const STACK_API = "https://127.0.0.1:57404";
      const STACK_DOWNLOAD_BASE = "https://stack.lol/downloads";

      async function isStackAppRunning() {
        try {
          const r = await fetch(`${STACK_API}/health`, {
            signal: AbortSignal.timeout(1500),
          });
          return (await r.text()).trim() === "OK";
        } catch {
          return false;
        }
      }

      /**
       * Ask the Stack Desktop app to run a stack from the catalog.
       * POSTs the public download URL — the Desktop app fetches,
       * extracts, and docker-compose-ups it.
       * Returns a ReadableStream of log lines, or throws on failure.
       */
      async function runStackFromCatalog(slug) {
        const downloadUrl = `${STACK_DOWNLOAD_BASE}/${slug}.stack`;
        const r = await fetch(`${STACK_API}/run`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ slug: downloadUrl }),
        });
        if (!r.ok) throw new Error(`Stack API returned ${r.status}`);
        return r.body;
      }

      /**
       * Consume a ReadableStream of log text and call onLine for each chunk.
       */
      async function streamLogs(body, onLine) {
        const reader = body.getReader();
        const dec = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          onLine(dec.decode(value, { stream: true }));
        }
      }

      // ─── HighlightedPrompt ──────────────────────────────────────────────

      function HighlightedPrompt({ catalog, ...promptProps }) {
        const wrapperRef = useRef(null);

        useEffect(() => {
          const wrapper = wrapperRef.current;
          if (!wrapper || catalog.length === 0) return;

          const terms = [];
          const seen = new Set();
          for (const t of catalog) {
            const nl = t.name.toLowerCase();
            if (nl.length >= 2 && !seen.has(nl)) {
              terms.push(nl);
              seen.add(nl);
            }
            const sl = (t.slug ?? "").toLowerCase();
            if (sl.length >= 2 && !seen.has(sl)) {
              terms.push(sl);
              seen.add(sl);
            }
          }
          terms.sort((a, b) => b.length - a.length);

          const esc = (s) =>
            s
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");

          const buildHTML = (text) => {
            if (!text) return "";
            const lower = text.toLowerCase();
            const ranges = [];
            for (const term of terms) {
              let i = 0;
              while ((i = lower.indexOf(term, i)) !== -1) {
                ranges.push([i, i + term.length]);
                i += term.length;
              }
            }
            if (!ranges.length) return esc(text);
            ranges.sort((a, b) => a[0] - b[0]);
            const merged = [];
            for (const r of ranges) {
              const last = merged[merged.length - 1];
              if (last && r[0] <= last[1]) last[1] = Math.max(last[1], r[1]);
              else merged.push([...r]);
            }
            let html = "",
              c = 0;
            for (const [s, e] of merged) {
              html += esc(text.slice(c, s));
              html += `<mark>${esc(text.slice(s, e))}</mark>`;
              c = e;
            }
            return html + esc(text.slice(c));
          };

          const COPY_PROPS = [
            "fontFamily",
            "fontSize",
            "fontWeight",
            "fontStyle",
            "fontVariant",
            "fontStretch",
            "lineHeight",
            "letterSpacing",
            "wordSpacing",
            "textAlign",
            "textIndent",
            "textTransform",
            "textDecoration",
            "paddingTop",
            "paddingRight",
            "paddingBottom",
            "paddingLeft",
            "borderTopWidth",
            "borderRightWidth",
            "borderBottomWidth",
            "borderLeftWidth",
            "boxSizing",
            "tabSize",
            "direction",
            "writingMode",
          ];

          let ta = null,
            mirror = null,
            disposed = false,
            lastVal = "\0";
          let origColor = "";

          const setupMirror = () => {
            origColor = getComputedStyle(ta).color;
            mirror = document.createElement("div");
            mirror.setAttribute("aria-hidden", "true");
            wrapper.style.position = "relative";
            wrapper.appendChild(mirror);
            ta.style.color = "transparent";
            ta.style.caretColor = origColor;
            ta.addEventListener("scroll", () => {
              if (!mirror) return;
              if (ta.tagName === "INPUT") {
                mirror.scrollLeft = ta.scrollLeft;
              } else {
                mirror.scrollTop = ta.scrollTop;
              }
            });
          };

          const syncMirror = () => {
            if (!ta || !mirror) return;
            const cs = getComputedStyle(ta);
            const wRect = wrapper.getBoundingClientRect();
            const tRect = ta.getBoundingClientRect();
            const isInput = ta.tagName === "INPUT";
            Object.assign(mirror.style, {
              position: "absolute",
              top: tRect.top - wRect.top + "px",
              left: tRect.left - wRect.left + "px",
              width: tRect.width + "px",
              height: tRect.height + "px",
              pointerEvents: "none",
              overflow: "hidden",
              whiteSpace: isInput ? "nowrap" : "pre-wrap",
              wordWrap: isInput ? "normal" : "break-word",
              overflowWrap: isInput ? "normal" : "break-word",
              color: origColor,
              background: "transparent",
              borderStyle: cs.borderStyle,
              borderColor: "transparent",
              zIndex: "0",
            });
            for (const prop of COPY_PROPS) mirror.style[prop] = cs[prop];
          };

          const tick = () => {
            if (disposed) return;
            if (!ta) {
              ta =
                wrapper.querySelector("textarea") ||
                wrapper.querySelector('input[type="text"]');
              if (ta) setupMirror();
            }
            if (ta && mirror) {
              syncMirror();
              if (ta.value !== lastVal) {
                lastVal = ta.value;
                mirror.innerHTML = buildHTML(lastVal) || "\u200b";
              }
              // Sync scroll — horizontal for inputs, vertical for textareas
              if (ta.tagName === "INPUT") {
                mirror.scrollLeft = ta.scrollLeft;
              } else {
                mirror.scrollTop = ta.scrollTop;
              }
            }
            requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);

          return () => {
            disposed = true;
            if (ta) {
              ta.style.color = "";
              ta.style.caretColor = "";
            }
            mirror?.remove();
          };
        }, [catalog]);

        return (
          <div ref={wrapperRef} style={{ width: "100%" }}>
            <PromptHero {...promptProps} />
          </div>
        );
      }

      // ─── App ─────────────────────────────────────────────────────────────

      function App() {
        // Catalog state
        const [stacks, setStacks] = useState([]);
        const approxStackCount = parseInt(Math.floor(stacks.length / 10)) * 10;
        const [catalog, setCatalog] = useState([]);

        // AI model state
        // AI model state (reserved for future use)
        // const [aiModel, setAiModel] = useState(AI_MODELS[0]);

        // Conversation state
        const [messages, setMessages] = useState([]);
        const [phase, setPhase] = useState("idle"); // idle | analyzing | hitl | fetching | done
        const [selections, setSelections] = useState({}); // saasSlug → stack
        const [pendingHITL, setPendingHITL] = useState([]); // saasSlug[] needing user input
        const [fetchedFiles, setFetchedFiles] = useState({}); // slug → { compose, env }
        const [detailPopover, setDetailPopover] = useState(null); // { slug, name, link } | null
        const [servicePopover, setServicePopover] = useState(null); // { slug, name, domain } | null
        const [runProgress, setRunProgress] = useState({}); // slug → 'pending'|'running'|'live'|'error'
        const [isRunning, setIsRunning] = useState(false);
        const [isDeploying, setIsDeploying] = useState(false);

        // Refs for async flow
        const convoRef = useRef(null);
        const selectionsRef = useRef({});
        selectionsRef.current = selections;

        // ── Message helpers ──
        const addMsg = useCallback((msg) => {
          const m = { id: msgId(), ...msg };
          setMessages((prev) => [...prev, m]);
          return m.id;
        }, []);

        const updateMsg = useCallback((id, updates) => {
          setMessages((prev) =>
            prev.map((m) => (m.id === id ? { ...m, ...updates } : m)),
          );
        }, []);

        // ── Auto-scroll ──
        useEffect(() => {
          if (convoRef.current) {
            convoRef.current.scrollIntoView({
              behavior: "smooth",
              block: "end",
            });
          }
        }, [messages]);

        // ── Fetch stacks on mount ──
        useEffect(() => {
          fetch("./stacks.json")
            .then((r) => r.json())
            .then((data) => {
              const items = data.items ?? [];
              setStacks(items);
              const saasTools = [
                ...new Set(items.flatMap((s) => s.alternativeTo ?? [])),
              ]
                .filter((slug) => !EXCLUDED_SAAS.has(slug))
                .map((slug) => ({ slug, name: saasDisplayName(slug) }))
                .sort((a, b) => a.name.localeCompare(b.name));
              setCatalog(saasTools);
            })
            .catch(() => {});
        }, []);

        // ── Match SaaS tools from user text ──
        const matchTools = (text) => {
          const lower = text.toLowerCase();
          return catalog.filter(
            (t) =>
              lower.includes(t.name.toLowerCase()) ||
              lower.includes(t.slug.toLowerCase()),
          );
        };

        // ── Find alternatives for a SaaS tool ──
        const findAlternatives = (saasSlug) => {
          return stacks
            .filter((s) =>
              (s.alternativeTo ?? []).some(
                (a) => a.toLowerCase() === saasSlug.toLowerCase(),
              ),
            )
            .sort((a, b) => (b.stars ?? 0) - (a.stars ?? 0));
        };

        // ── HITL selection handler ──
        const handleHITLSelect = (saasSlug, stack) => {
          setSelections((prev) => ({ ...prev, [saasSlug]: stack }));
          setPendingHITL((prev) => prev.filter((s) => s !== saasSlug));
          // Mark the corresponding HITL message as non-thinking
          setMessages((prev) =>
            prev.map((m) =>
              m.type === "hitl" && m.saasSlug === saasSlug
                ? { ...m, thinking: false }
                : m,
            ),
          );
        };

        // ── Watch for HITL completion → proceed to fetch ──
        useEffect(() => {
          if (phase === "hitl" && pendingHITL.length === 0) {
            const timer = setTimeout(() => {
              proceedToFetch(selectionsRef.current);
            }, 600);
            return () => clearTimeout(timer);
          }
        }, [phase, pendingHITL]);

        // ── Fetch compose files & build recipe ──
        const proceedToFetch = async (allSelections) => {
          setPhase("fetching");

          const slugs = [
            ...new Set(Object.values(allSelections).map((s) => s.slug)),
          ];

          // Create recipe immediately — shows thinking while files load
          const recipeId = addMsg({
            role: "ai",
            agent: "Exodus",
            type: "recipe",
            thinking: "preparing your stack…",
            allSelections,
            files: {},
          });

          const files = {};

          for (const slug of slugs) {
            const base = `${GITHUB_BASE}/${slug}`;
            files[slug] = {};

            try {
              const r = await fetch(`${base}/compose.yaml`);
              if (r.ok) files[slug].compose = await r.text();
            } catch {}

            try {
              const r = await fetch(`${base}/.env`);
              if (r.ok) files[slug].env = await r.text();
            } catch {}

            // Parse compose.yaml for additional env_file entries
            if (files[slug].compose) {
              const envFileMatches = [
                ...files[slug].compose.matchAll(
                  /(?:env_file:\s*|\-\s+)(\.[a-zA-Z0-9._-]+\.env|[a-zA-Z0-9._-]+\.env)/gm,
                ),
              ].map((m) => m[1]);
              if (envFileMatches.length > 0) {
                for (const envPath of envFileMatches) {
                  if (envPath && envPath !== ".env" && !files[slug][envPath]) {
                    try {
                      const r = await fetch(`${base}/${envPath}`);
                      if (r.ok) files[slug][envPath] = await r.text();
                    } catch {}
                  }
                }
              }
            }

            updateMsg(recipeId, { files: { ...files } });
          }

          setFetchedFiles(files);
          updateMsg(recipeId, { thinking: false, files });
          setPhase("done");
        };

        // ── Download helpers ──
        const downloadCompose = (files) => {
          const merged = Object.entries(files)
            .filter(([_, f]) => f.compose)
            .map(
              ([slug, f]) =>
                `# ════════════════════════════════════════\n# ${slug}\n# ════════════════════════════════════════\n\n${f.compose}`,
            )
            .join("\n\n");
          downloadFile(merged, "docker-compose.yml");
        };

        const downloadEnv = (files) => {
          const merged = Object.entries(files)
            .filter(([_, f]) => f.env)
            .map(([slug, f]) => `# ── ${slug} ──\n${f.env}`)
            .join("\n\n");
          downloadFile(merged, ".env");
        };

        // ── Run all stacks via Stack Desktop app ──
        const handleRunAll = async (allSelections) => {
          const appRunning = await isStackAppRunning();
          if (!appRunning) {
            addMsg({
              role: "ai",
              agent: "Exodus",
              type: "text",
              thinking: false,
              text: "The **Stack Desktop app** isn't running. Open it first, then try again. [Get it here](https://stack.lol/download).",
            });
            return;
          }

          setIsRunning(true);
          const slugs = [
            ...new Set(Object.values(allSelections).map((s) => s.slug)),
          ];

          // Initialize progress
          const initial = {};
          for (const s of slugs) initial[s] = "pending";
          setRunProgress(initial);

          const runMsgId = addMsg({
            role: "ai",
            agent: "Exodus",
            type: "run-progress",
            thinking: "starting your stacks…",
            slugs,
            logs: {},
          });

          const allLogs = {};

          for (const slug of slugs) {
            setRunProgress((prev) => ({ ...prev, [slug]: "running" }));
            allLogs[slug] = "";
            try {
              const body = await runStackFromCatalog(slug);
              await streamLogs(body, (chunk) => {
                allLogs[slug] += chunk;
                updateMsg(runMsgId, { logs: { ...allLogs } });
              });
              setRunProgress((prev) => ({ ...prev, [slug]: "live" }));
            } catch (err) {
              allLogs[slug] += `\n⚠ Error: ${err.message}`;
              updateMsg(runMsgId, { logs: { ...allLogs } });
              setRunProgress((prev) => ({ ...prev, [slug]: "error" }));
            }
          }

          updateMsg(runMsgId, { thinking: false });
          setIsRunning(false);
        };

        // ── Cloud deploy to AWS ──
        const handleCloudDeploy = async (allSelections, files) => {
          setIsDeploying(true);
          const slugs = [
            ...new Set(Object.values(allSelections).map((s) => s.slug)),
          ];

          const stackPayload = slugs
            .map((slug) => {
              const compose = files[slug]?.compose || "";
              const image = parseComposeImage(compose);
              if (!image) return null;
              return {
                name: slug,
                image,
                port: parseComposePort(compose),
              };
            })
            .filter(Boolean);

          if (!stackPayload.length) {
            addMsg({
              role: "ai",
              agent: "Exodus",
              type: "text",
              thinking: false,
              text: "Could not extract Docker images from the compose files. Deploy requires an `image:` field.",
            });
            setIsDeploying(false);
            return;
          }

          const deployMsgId = addMsg({
            role: "ai",
            agent: "Exodus",
            type: "cloud-deploy",
            thinking: "deploying to AWS…",
            deployments: [],
            services: [],
          });

          try {
            const resp = await fetch(`${EXODUS_API}/deploy`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ stacks: stackPayload }),
            });
            const data = await resp.json();
            if (!resp.ok)
              throw new Error(data.error || `Deploy failed (${resp.status})`);

            updateMsg(deployMsgId, { deployments: data.deployments });

            // Poll /status until all services are healthy
            let attempts = 0;
            const poll = async () => {
              if (attempts++ > 30) {
                updateMsg(deployMsgId, { thinking: false });
                setIsDeploying(false);
                return;
              }
              try {
                const sr = await fetch(`${EXODUS_API}/status`);
                const sd = await sr.json();
                const deploySlugs = data.deployments.map((d) => d.slug);
                const relevant = (sd.services || []).filter((s) =>
                  deploySlugs.includes(s.slug),
                );
                const allHealthy =
                  relevant.length === deploySlugs.length &&
                  relevant.every((s) => s.healthy);

                updateMsg(deployMsgId, {
                  services: relevant,
                  thinking: allHealthy ? false : "waiting for services…",
                });

                if (allHealthy) {
                  setIsDeploying(false);
                  return;
                }
              } catch {}
              setTimeout(poll, 10000);
            };
            setTimeout(poll, 10000);
          } catch (e) {
            updateMsg(deployMsgId, {
              thinking: false,
              error: e.message,
            });
            setIsDeploying(false);
          }
        };

        // ── The Agent ──
        const runAgent = async (text) => {
          // Reset state
          setMessages([]);
          setSelections({});
          setPendingHITL([]);
          setFetchedFiles({});
          setRunProgress({});
          setIsRunning(false);
          selectionsRef.current = {};
          setPhase("analyzing");

          await delay(50); // Let state flush

          // Step 1: User message
          addMsg({ role: "user", type: "text", text });

          await delay(600);

          // Step 2: Analyze
          const thinkId = addMsg({
            role: "ai",
            agent: "Exodus",
            type: "text",
            thinking: "analyzing your tools…",
            text: "",
          });

          await delay(1200);

          const matched = matchTools(text);

          if (matched.length === 0) {
            // Try AI fallback
            updateMsg(thinkId, {
              thinking: false,
              text: 'I couldn\'t identify any SaaS tools in your message. Try mentioning specific tools — for example: "We use Notion, Slack, and Jira" or "Datadog, GitHub, Vercel".',
            });
            setPhase("idle");
            return;
          }

          // Deduplicate
          const uniqueMatched = [];
          const seenSlugs = new Set();
          for (const t of matched) {
            if (!seenSlugs.has(t.slug)) {
              seenSlugs.add(t.slug);
              uniqueMatched.push(t);
            }
          }

          updateMsg(thinkId, {
            thinking: false,
            text:
              uniqueMatched.length === 1
                ? `Replacing **${uniqueMatched[0].name}**.`
                : `Replacing ${uniqueMatched.map((t) => `**${t.name}**`).join(", ")}.`,
          });

          // Step 3: Recommend alternatives for each tool
          const newSelections = {};
          const newPendingHITL = [];

          for (const tool of uniqueMatched) {
            await delay(700);

            const candidates = findAlternatives(tool.slug);
            const strongCandidates = candidates.filter(
              (c) => (c.stars ?? 0) >= STRONG_THRESHOLD,
            );

            if (candidates.length === 0) {
              addMsg({
                role: "ai",
                agent: "Exodus",
                type: "text",
                thinking: false,
                text: `No open-source alternative found for **${tool.name}** in the catalog yet.`,
              });
            } else if (strongCandidates.length <= 1) {
              // Auto-select best candidate
              const best = strongCandidates[0] || candidates[0];
              newSelections[tool.slug] = best;
              const autoId = addMsg({
                role: "ai",
                agent: "Exodus",
                type: "auto-select",
                thinking: "selecting…",
                saasSlug: tool.slug,
                saasName: tool.name,
                stack: best,
                isStrong: (best.stars ?? 0) >= STRONG_THRESHOLD,
              });
              await delay(500);
              updateMsg(autoId, { thinking: false });
            } else {
              // Multiple strong candidates → HITL
              newPendingHITL.push(tool.slug);
              addMsg({
                role: "ai",
                agent: "Exodus",
                type: "hitl",
                thinking: "waiting for your choice…",
                saasSlug: tool.slug,
                saasName: tool.name,
                candidates: strongCandidates,
              });
            }
          }

          setSelections(newSelections);
          selectionsRef.current = newSelections;
          setPendingHITL(newPendingHITL);

          if (newPendingHITL.length > 0) {
            setPhase("hitl");
          } else if (Object.keys(newSelections).length > 0) {
            await delay(400);
            proceedToFetch(newSelections);
          }
        };

        // ── Submit handler ──
        const handleSubmit = (text) => {
          runAgent(text);
        };

        // ── Render a single message ──
        const renderMessage = (msg) => {
          switch (msg.type) {
            case "text":

                <ChatBubble

                      style={{
                        fontSize: "0.85rem",
                        color: "#8a8a96",
                        background: "none",
                        border: "none",

                        padding: "4px 0 0",
                        textDecoration: "underline",
                        textUnderlineOffset: "2px",
                        textAlign: "left",

                  </GlassCard>
                  <p
                    style={{
                      margin: "8px 0 0",
                      color: "#22c55e",
                      fontSize: "0.9rem",
                    }}
                  >
                    ✓ Auto-selected{" "}
                    {msg.isStrong ? "(top-rated)" : "(best available)"}
                  </p>
                </ChatBubble>

            case "hitl":
              return (
                <ChatBubble
                  key={msg.id}
                  role="ai"
                  agent="Exodus"

                  <p style={{ margin: "0 0 12px" }}>

                    <GradientText>
                      {msg.candidates.length} strong alternatives

                  <div style={styles.hitlGrid}>

                                fontSize: "0.8rem",

                          <p

                              fontSize: "0.85rem",

                            </Button>
                            <button

                                  slug: c.slug,

                                fontSize: "0.8rem",

                            </button>
                          </div>

                  </div>
                </ChatBubble>
              );

            case "recipe": {
              const ready = !msg.thinking;
              return (
                <ChatBubble

                  role="ai"
                  agent="Exodus"
                  thinking={msg.thinking}
                >
                  {ready && (
                    <p style={{ margin: "0 0 16px" }}>
                      <GradientText>
                        <Sparkle static solid glyph="⏏" /> Ready to deploy
                      </GradientText>
                    </p>

                  <div style={styles.recipeTable}>
                    {Object.entries(msg.allSelections).map(
                      ([saasSlug, stack]) => {

                                color={dotColor}

                            </span>
                            <span style={styles.recipeReplaces}>

                            {status === "live" && (
                              <button
                                onClick={() =>

                                    slug: stack.slug,

                                Open →

                  </div>

                  {ready && (
                    <>
                      <div

                    </>
                  )}
                </ChatBubble>

            }

            case "run-progress":

                <ChatBubble
                  key={msg.id}
                  role="ai"

                          : status === "error"

                      return (
                        <div key={slug}>
                          <div
                            style={{
                              display: "flex",
                              alignItems: "center",
                              gap: 8,
                              fontSize: "0.9rem",

                            <StatusDot
                              color={color}
                              static={status === "live" || status === "error"}
                            />
                            <strong>{slug}</strong>
                            <span
                              style={{
                                color,
                                fontSize: "0.8rem",
                                marginLeft: "auto",
                              }}
                            >
                              {label}
                            </span>
                            {status === "live" && (
                              <button
                                onClick={() =>
                                  setServicePopover({
                                    slug,
                                    name: slug,
                                    domain: `${slug}.stack.localhost`,

                                }
                                style={{
                                  ...styles.serviceLink,
                                  fontSize: "0.75rem",
                                }}
                              >
                                Try it out →
                              </button>

                          </div>
                          {msg.logs?.[slug] && (
                            <pre
                              style={{
                                ...styles.filePre,
                                maxHeight: 80,
                                marginTop: 4,
                                fontSize: "0.7rem",
                              }}
                            >
                              {msg.logs[slug]}
                            </pre>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </ChatBubble>
              );

            case "cloud-deploy": {
              const allHealthy =
                msg.deployments?.length > 0 &&
                msg.deployments.every(
                  (d) =>
                    (msg.services || []).find((s) => s.slug === d.slug)
                      ?.healthy,
                );
              return (
                <ChatBubble
                  key={msg.id}
                  role="ai"
                  agent="Exodus"
                  thinking={msg.thinking}
                >
                  {msg.error && (
                    <p style={{ color: "#ef4444", margin: "0 0 8px" }}>
                      ⚠ {msg.error}
                    </p>
                  )}

                  {allHealthy && (
                    <p style={{ margin: "0 0 16px" }}>
                      <GradientText>
                        <Sparkle static solid glyph="⏏" /> Your stack is live
                      </GradientText>
                    </p>
                  )}

                  {msg.deployments?.length > 0 && (
                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: 8,
                      }}
                    >
                      {msg.deployments.map((d) => {
                        const svc = (msg.services || []).find(
                          (s) => s.slug === d.slug,
                        );
                        const healthy = svc?.healthy;
                        return (
                          <div
                            key={d.slug}
                            style={{
                              padding: "12px 16px",
                              background: healthy
                                ? "rgba(34,197,94,0.06)"
                                : "rgba(255,255,255,0.03)",
                              border: `1px solid ${healthy ? "rgba(34,197,94,0.2)" : "rgba(255,255,255,0.08)"}`,
                              borderRadius: 10,
                            }}
                          >
                            <div
                              style={{
                                display: "flex",
                                alignItems: "center",
                                gap: 8,
                              }}
                            >
                              <StatusDot
                                color={healthy ? "#22c55e" : "#f59e0b"}
                                static={healthy}
                              />
                              <strong>{d.name}</strong>
                              {!healthy && (
                                <span
                                  style={{
                                    marginLeft: "auto",
                                    color: "#8a8a96",
                                    fontSize: "0.8rem",
                                  }}
                                >
                                  deploying…
                                </span>
                              )}
                            </div>
                            {healthy && (
                              <div
                                style={{
                                  display: "flex",
                                  alignItems: "center",
                                  gap: 12,
                                  marginTop: 10,
                                }}
                              >
                                <Button
                                  variant="glow"
                                  size="sm"
                                  onClick={() => {
                                    try {
                                      const host = new URL(d.url).hostname;
                                      setServicePopover({
                                        slug: d.slug,
                                        name: d.name,
                                        domain: host,
                                      });

                                    }

                                >
                                  Open {d.name} →
                                </Button>

                                  target="_blank"
                                  rel="noopener"
                                  style={{

                          </div>

                    </div>

                </ChatBubble>
              );

            default:
              return null;
          }
        };

        // ── Minimal markdown (bold only) ──
        const renderMarkdown = (text) => {
          const html = marked.parseInline(text);
          return <span dangerouslySetInnerHTML={{ __html: html }} />;
        };

        // ── Render ──
        return (
          <div style={styles.page}>
            {/* ─── Announcement bar ─── */}

            >

              NEXT Hackathon '26, Singapore
            </StickyBanner>

            {/* ─── Hero ─── */}
            <section style={{ position: "relative", overflow: "hidden" }}>
              <Aurora animated />
              <div
                style={{
                  ...styles.section,
                  paddingBottom: 0,
                  marginBottom: -16,
                  paddingTop: 16,

              >
                <h1 style={styles.brand}>
                  <Sparkle static solid glyph="⏏" /> Exodus
                </h1>
              </div>

              <div style={{ ...styles.hero, marginBottom: -32 }} id="picker">
                <div style={styles.heroInner}>
                  <h1 style={styles.h1}>
                    Stop paying rent on
                    <br />
                    <GradientText>
                      <WordRoll

                        words={(() => {
                          if (catalog.length === 0) {

                              "Notion",

                          }
                          // Top 12 SaaS tools by total stars of their alternatives
                          const saasStars = {};
                          for (const s of stacks) {

                              src={`https://esm.sh/simple-icons@11/icons/${name.toLowerCase().replaceAll(" ", "")}.svg`}

                        gradient
